<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguyễn Hương Giang — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-pale: #EAF3E6; --green-soft: #CBE0C3; --green: #A9CBA0; --green-deep: #7FAE78;
    --pink-pale: #FDEBEE; --pink-soft: #F6C9D0; --pink: #EFA6B4; --pink-deep: #E0839A;
    --cream: #FBF9F3; --ink: #454C40; --muted: #8C9382; --accent: #E0839A;
    --white-soft: #FFFFFF; --shadow: 0 22px 46px -24px rgba(90,110,80,0.35);
  }
  body{ margin: 0; font-family: 'Quicksand', sans-serif; color: var(--ink); background: linear-gradient(160deg, var(--cream) 0%, var(--green-pale) 45%, var(--pink-pale) 100%); background-attachment: fixed; }
  
  /* --- STICKER LILY STYLE --- */
  .lily-sticker {
      position: absolute; width: 60px; z-index: 10; pointer-events: none;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
      transition: transform 0.3s ease;
  }
  .lily-hero { top: -20px; right: -15px; transform: rotate(15deg); }
  .lily-intro { top: -30px; left: -25px; transform: rotate(-10deg); }
  .lily-tongket { bottom: -30px; right: -25px; transform: rotate(15deg); }

  /* Các phần còn lại giữ nguyên thiết kế cũ của bạn */
  .avatar-frame { position: relative; width: 260px; }
  .avatar-blob { width: 100%; aspect-ratio: 1/1; border-radius: 44% 56% 62% 38% / 48% 42% 58% 52%; background: linear-gradient(150deg, var(--green-soft), var(--pink-soft)); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: var(--shadow); }
  .avatar-img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-sticker { position: absolute; width: 46px; height: 46px; border-radius: 50%; background: #fff; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  
  /* Giữ nguyên các class layout cũ */
  .hero-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 50px; align-items: center; }
  .intro-card { background: var(--white-soft); border-radius: 26px; padding: 28px 30px; box-shadow: var(--shadow); border: 1px solid rgba(127,174,120,0.14); margin-bottom: 22px; }
  .reflect-col { background: var(--white-soft); border-radius: 26px; padding: 26px 28px; box-shadow: var(--shadow); }
  .section-head { margin-bottom: 40px; }
  .tag { display: inline-block; background: #fff; padding: 6px 16px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; color: var(--accent); box-shadow: var(--shadow); margin-bottom: 12px; }
  section { padding: 90px 8vw 20px; max-width: 1080px; margin: 0 auto; }
</style>
</head>
<body>

<main>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-grid">
      <div class="hero-inner">
        <h1>Nguyễn Hương <span style="color:var(--accent)">Giang</span></h1>
        <p>Sinh viên ngành Ngôn ngữ và Văn hoá Anh...</p>
      </div>
      <div class="avatar-wrap">
        <div class="avatar-frame">
          <div class="avatar-blob">
            <img class="avatar-img" src="huonggiang.jpg">
          </div>
          <!-- Sticker Lily dán lên góc Avatar -->
          <img src="lily-sticker1.png" class="lily-sticker lily-hero">
          <!-- Icon lá chuyển sang góc đối diện -->
          <div class="avatar-sticker" style="bottom: -6px; left: 6px;">🌿</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Intro Section -->
  <section id="gioithieu">
    <div class="intro-card" style="position: relative;">
      <img src="lily-sticker2.png" class="lily-sticker lily-intro">
      <h3>Giới thiệu</h3>
      <p>Xin chào, mình là Nguyễn Hương Giang...</p>
    </div>
  </section>

  <!-- Tổng kết Section -->
  <section id="tongket">
    <div class="reflect-col" style="position: relative;">
      <img src="lily-sticker1.png" class="lily-sticker lily-tongket">
      <h3>📚 Bài học nhận được</h3>
      <p>Hoàn thành portfolio này là một trải nghiệm đáng nhớ...</p>
    </div>
  </section>
</main>

</body>
</html>
